<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
:root{
  --panel:rgba(7,12,22,.72);--panel2:rgba(15,23,42,.84);--line:rgba(255,255,255,.12);

}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#030712;color:var(--txt);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#canvas-container{position:fixed;inset:0;z-index:0;background:linear-gradient(#7eb9e9,#d8f2ff 55%,#496c4b)}
.glass-panel{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);border-radius:18px}
.small-panel{background:rgba(2,6,23,.66);border:1px solid rgba(255,255,255,.1);border-radius:14px}
.tool-btn,.speed-btn,.mini-btn{transition:transform .18s ease,background .18s ease,border-color .18s ease,box-shadow .18s ease,color .18s ease;touch-action:manipulation}
.tool-btn{border:1px solid rgba(255,255,255,.07);background:rgba(15,23,42,.8);color:#cbd5e1}
.tool-btn:hover{transform:translateY(-2px);background:rgba(30,41,59,.95);color:#fff}
.tool-btn.active{transform:translateY(-5px);background:rgba(37,99,235,.34);border-color:#60a5fa;color:#fff;box-shadow:0 12px 30px rgba(37,99,235,.42),inset 0 1px 0 rgba(255,255,255,.18)}
.speed-btn.active,.mini-btn.active{background:#2563eb;color:#fff;box-shadow:0 8px 24px rgba(37,99,235,.35)}
.demand-bar{transition:height .5s ease,background .3s ease}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{scrollbar-width:none}
#toast{position:fixed;left:50%;bottom:118px;transform:translateX(-50%) translateY(20px);opacity:0;transition:.25s ease;z-index:40;pointer-events:none;max-width:min(92vw,560px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#loading-cover{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,#1e3a8a,#020617 65%);transition:opacity .5s ease;pointer-events:none}
#loading-cover.hide{opacity:0}
.loader{width:42px;height:42px;border:3px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

  .tool-btn{min-width:58px!important;width:58px!important;height:58px!important}.tool-btn span{font-size:9px!important}
}
</style>

<div id="tooltip" class="fixed hidden glass-panel p-3 z-50 pointer-events-none min-w-[180px]"><div id="tt-title" class="font-black text-sm border-b border-white/10 pb-2 mb-2">セル</div><div id="tt-desc" class="text-xs text-slate-300 leading-relaxed">説明</div><div id="tt-hint" class="text-[10px] font-black text-orange-300 bg-orange-950/60 p-2 rounded-lg mt-2 hidden">ヒント</div></div>

<script>
(() => {
'use strict';

if (window.lucide) lucide.createIcons();

const cover = document.getElementById('loading-cover');
const container = document.getElementById('canvas-container');
if (!window.THREE || !THREE.OrbitControls) {
  cover.innerHTML = '<div class="glass-panel p-6 text-center"><div class="font-black text-xl mb-2">読み込みに失敗しました</div><div class="text-sm text-slate-300">Three.js のCDNを読み込めませんでした。ネット接続を確認してください。</div></div>';
  return;
}

// =============================
// 基本設定
// =============================
const COLS = 96;
const ROWS = 96;
const CENTER_X = COLS / 2 - 0.5;
const CENTER_Z = ROWS / 2 - 0.5;
const MAX_LEVEL = 5;
const SAVE_KEY = 'micro_skylines_ultimate_complete_v1'; // 同じキーで保存を継続。今回から都市状態もまとめて保存

const TYPES = Object.freeze({
  EMPTY:0, WATER:1, TREE:2, ROAD:3, RES:4, COM:5, IND:6, PARK:7,
  RAIL:8, STATION:9, SCHOOL:10, HOSPITAL:11, POWER:12
});
const TYPE_NAME = {
  [TYPES.EMPTY]:'未開発地', [TYPES.WATER]:'水辺', [TYPES.TREE]:'自然林', [TYPES.ROAD]:'道路',
  [TYPES.RES]:'住宅区画', [TYPES.COM]:'商業区画', [TYPES.IND]:'産業区画', [TYPES.PARK]:'公園',
  [TYPES.RAIL]:'線路', [TYPES.STATION]:'駅', [TYPES.SCHOOL]:'学校', [TYPES.HOSPITAL]:'病院', [TYPES.POWER]:'発電所'
};
const COSTS = {
  road:10, rail:70, station:420, res:25, com:35, ind:35, park:80, school:620, hospital:760, power:950, bulldoze:5
};
const TOOL_TYPE = { road:TYPES.ROAD, rail:TYPES.RAIL, station:TYPES.STATION, res:TYPES.RES, com:TYPES.COM, ind:TYPES.IND, park:TYPES.PARK, school:TYPES.SCHOOL, hospital:TYPES.HOSPITAL, power:TYPES.POWER };

let randSeed = 913257;
function rand(){
  randSeed |= 0; randSeed = randSeed + 0x6D2B79F5 | 0;
  let t = Math.imul(randSeed ^ randSeed >>> 15, 1 | randSeed);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function hash01(x,y,s=0){
  let n = Math.sin(x * 127.1 + y * 311.7 + s * 74.7) * 43758.5453123;
  return n - Math.floor(n);
}
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function inside(x,y){ return x>=0 && x<COLS && y>=0 && y<ROWS; }
function cellAt(x,y){ return inside(x,y) ? state.grid[y][x] : null; }
function isRoadLike(t){ return t === TYPES.ROAD || t === TYPES.STATION; }
function isRailLike(t){ return t === TYPES.RAIL || t === TYPES.STATION; }
function isZone(t){ return t === TYPES.RES || t === TYPES.COM || t === TYPES.IND; }
function isService(t){ return t === TYPES.PARK || t === TYPES.SCHOOL || t === TYPES.HOSPITAL || t === TYPES.POWER || t === TYPES.STATION; }
function moneyText(v){ return '$' + Math.round(v).toLocaleString(); }

const state = {
  grid: [], money: 52000, population: 0, jobs: 0, happiness: 82, traffic: 0,
  day: 1, hour: 6, tickCounter: 0, speed: 1, selectedTool:'pointer', isDraggingTool:false,
  demandR:65, demandC:25, demandI:25, incomeLastDay:0, upkeepLastDay:0,
  powerUse:0, powerCap:0, railCount:0, stationCount:0, highQuality:true, forceNight:false,
  lastAppliedKey:'', autoSaveCounter:0
};

// =============================
// Three.js セットアップ
// =============================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8bbfe8);
scene.fog = new THREE.FogExp2(0x8bbfe8, 0.011);

const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 700);
camera.position.set(CENTER_X + 28, 56, CENTER_Z + 64);

const renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance', alpha:false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.08;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(CENTER_X, 0, CENTER_Z);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 7;
controls.maxDistance = 165;
controls.maxPolarAngle = Math.PI/2 - 0.025;
controls.rotateSpeed = 0.7;
controls.panSpeed = 0.85;

const hemiLight = new THREE.HemisphereLight(0xdbeafe, 0x233016, 0.78);
scene.add(hemiLight);
const sun = new THREE.DirectionalLight(0xfff0d1, 2.45);
sun.position.set(COLS*0.85, 88, ROWS*0.22);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 180;
sun.shadow.camera.left = -62; sun.shadow.camera.right = 62; sun.shadow.camera.top = 62; sun.shadow.camera.bottom = -62;
sun.shadow.bias = -0.0007;
scene.add(sun);
const moon = new THREE.DirectionalLight(0x8db4ff, 0.0);
moon.position.set(-35, 55, -25);
scene.add(moon);

function makeEnvTexture(){
  const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,256);
  grad.addColorStop(0,'#74b7ef'); grad.addColorStop(.45,'#e9f8ff'); grad.addColorStop(.52,'#5a7e52'); grad.addColorStop(1,'#182617');
  ctx.fillStyle = grad; ctx.fillRect(0,0,512,256);
  ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.beginPath(); ctx.arc(390,64,32,0,Math.PI*2); ctx.fill();
  const tex = new THREE.CanvasTexture(canvas);
  tex.mapping = THREE.EquirectangularReflectionMapping;
  tex.encoding = THREE.sRGBEncoding;
  return tex;
}
scene.environment = makeEnvTexture();

// =============================
// テクスチャ・マテリアル
// =============================
function canvasTex(w,h,draw,repeatX=1,repeatY=1){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const ctx=c.getContext('2d'); draw(ctx,w,h);
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=THREE.RepeatWrapping; tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(repeatX,repeatY); tex.encoding=THREE.sRGBEncoding; tex.anisotropy = renderer.capabilities.getMaxAnisotropy ? Math.min(8, renderer.capabilities.getMaxAnisotropy()) : 1;
  return tex;
}
function terrainTexture(){
  return canvasTex(1024,1024,(ctx,w,h)=>{
    ctx.fillStyle='#3f6c3f'; ctx.fillRect(0,0,w,h);
    for(let i=0;i<80000;i++){
      const x=Math.random()*w,y=Math.random()*h,a=Math.random()*.1;
      const g=80+Math.floor(Math.random()*80);
      ctx.fillStyle=`rgba(${g},${110+Math.random()*45},${55+Math.random()*40},${a})`;
      ctx.fillRect(x,y,1+Math.random()*3,1+Math.random()*3);
    }
    for(let y=0;y<h;y+=64){ctx.strokeStyle='rgba(255,255,255,.025)';ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
    for(let x=0;x<w;x+=64){ctx.strokeStyle='rgba(0,0,0,.025)';ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
  }, COLS/18, ROWS/18);
}

function newCell(type=TYPES.EMPTY){ return { type, level:0, age:0, meshObj:null, seed:rand(), lastScore:0 }; }
function initGrid(){
  state.grid = [];
  randSeed = 913257;
  for(let y=0;y<ROWS;y++){
    const row=[];
    for(let x=0;x<COLS;x++){
      const nx=(x-CENTER_X)/COLS, ny=(y-CENTER_Z)/ROWS;
      let type=TYPES.EMPTY;
      const river = Math.abs(Math.sin(x*.075 + y*.022) * 7 + Math.cos(y*.06)*2 + (x-COLS*.25)) < 2.2;
      const lake = Math.hypot(x-76,y-22)<5.8 || Math.hypot(x-18,y-77)<6.4;
      const forestNoise = Math.sin(x*.19+1.7)*Math.cos(y*.17-0.4)+hash01(x,y,2)*.7;
      if((river && y>8 && y<ROWS-8) || lake) type=TYPES.WATER;
      else if(forestNoise>.9 && Math.hypot(nx,ny)>.14) type=TYPES.TREE;
      row.push(newCell(type));
    }
    state.grid.push(row);
  }
  // 初期の小さな街・道路・線路
  for(let x=37;x<=59;x++){ safeSet(x,48,TYPES.ROAD); }
  for(let y=39;y<=58;y++){ safeSet(48,y,TYPES.ROAD); }
  for(let x=35;x<=61;x++){ if(x%2===0) safeSet(x,54,TYPES.ROAD); }
  for(let y=42;y<=56;y++){ if(y%2===0) safeSet(42,y,TYPES.ROAD); }
  const zones = [
    [45,45,TYPES.RES],[46,45,TYPES.RES],[49,45,TYPES.COM],[50,45,TYPES.COM],[45,50,TYPES.RES],[46,50,TYPES.RES],
    [51,50,TYPES.COM],[52,50,TYPES.COM],[40,51,TYPES.IND],[40,52,TYPES.IND],[54,52,TYPES.PARK],
    [43,47,TYPES.SCHOOL],[53,47,TYPES.HOSPITAL]
  ];
  zones.forEach(([x,y,t])=>{ if(cellAt(x,y)?.type!==TYPES.WATER){ safeSet(x,y,t); if(isZone(t)) cellAt(x,y).level=1; }});
  for(let x=31;x<=65;x++) safeSet(x,62,TYPES.RAIL);
  safeSet(48,62,TYPES.STATION);
  safeSet(61,62,TYPES.STATION);
}

function createRail(group,x,y){

function createBuilding(group,x,y,cell){
  createZoneBase(group,cell.type);
  if(cell.level<=0){ createConstruction(group,x,y); return; }
  const s = cell.seed || hash01(x,y,5);
  let matArr = cell.type===TYPES.RES ? matsRes : cell.type===TYPES.COM ? matsCom : matsInd;
  const mat = matArr[Math.min(matArr.length-1, Math.floor((cell.level-1)/2))];
  let width = cell.type===TYPES.RES ? .78 : cell.type===TYPES.COM ? .84 : .86;
  let depth = width * (.88 + s*.22);
  let height = (cell.type===TYPES.RES? .65 : cell.type===TYPES.COM? .9 : .75) + cell.level * (cell.type===TYPES.COM?1.35:cell.type===TYPES.RES?.86:1.0) + s*.65;
  if(cell.type===TYPES.COM && cell.level>=4) height += 2.2;
  const body=smallBox(width,height,depth,mat,0,height/2,0,true,true);
  body.rotation.y = (s>.5 ? 0 : Math.PI/2);
  group.add(body);
  // ガラス高層棟
  if(cell.type===TYPES.COM && cell.level>=3){
    const tower=smallBox(width*.48,height*.78,depth*.48,matGlass,.18,height+height*.39,-.14,true,true);
    group.add(tower);
    const cap=smallBox(width*.58,.18,depth*.58,matBlack,.18,height*1.78+.1,-.14,true,true); group.add(cap);
  }
  // 住宅屋根
  if(cell.type===TYPES.RES && cell.level<=2){
    const roof=new THREE.Mesh(geoCone,matRoof); roof.scale.set(width*.78,.38,depth*.78); roof.position.y=height+.19; roof.rotation.y=Math.PI/4; roof.castShadow=true; group.add(roof);
  } else {
    group.add(smallBox(width*.86,.1,depth*.86,matBlack,0,height+.05,0,true,true));
    if(cell.level>=2) group.add(smallBox(.24,.18,.24,matRoadEdge,-.18,height+.18,.18,true,true));
  }
  // 産業設備
  if(cell.type===TYPES.IND){
    const chimH = height*.72 + .7;
    const chim=cyl(.11,chimH,matDirt,.28,chimH/2,.26); group.add(chim);
    updateSmokeEmitter(x,y,false,chimH+.05);
    const tank=cyl(.22,Math.max(.45,height*.42),matsInd[1],-.25,Math.max(.45,height*.42)/2,-.24); group.add(tank);
  }
  // 夜用の窓パネル
  if(cell.level>=3 && hash01(x,y,10)>.35){
    const glow=smallBox(width*.08,height*.7,.012,matWindowNight,width*.49,height*.52,0,false,false);
    glow.visible = isNight(); group.add(glow); cell.glowObj=glow;
  }
}

function createMeshForCell(x,y,cell,animate=false){
  removeCellMesh(cell);
  updateSmokeEmitter(x,y,true);
  if(cell.type===TYPES.EMPTY) return;
  const group=new THREE.Group(); group.position.set(x,0,y); group.userData.gridX=x; group.userData.gridY=y;
  if(cell.type===TYPES.WATER) createWater(group,x,y);
  else if(cell.type===TYPES.TREE) createTree(group,x,y,.85+hash01(x,y,7)*.45);
  else if(cell.type===TYPES.ROAD) createRoad(group,x,y);
  else if(cell.type===TYPES.RAIL) createRail(group,x,y);
  else if(cell.type===TYPES.PARK) createPark(group,x,y);
  else if(isZone(cell.type)) createBuilding(group,x,y,cell);
  else if(cell.type===TYPES.STATION) createStation(group,x,y);
  else if(cell.type===TYPES.SCHOOL) createSchool(group,x,y);
  else if(cell.type===TYPES.HOSPITAL) createHospital(group,x,y);
  else if(cell.type===TYPES.POWER) createPower(group,x,y);
  meshGroup.add(group); cell.meshObj=group;
  if(animate){
    group.scale.y = .02;
    buildingAnimations.push({obj:group, t:0, speed:1.8+hash01(x,y,13)});
  }
}
function updateCellAndNeighbors(x,y){
  const pts=[[x,y],[x-1,y],[x+1,y],[x,y-1],[x,y+1]];

}

function createVehicleMesh(kind='car'){
  const g=new THREE.Group(); const mat = kind==='bus'?busMat:carMats[Math.floor(rand()*carMats.length)];
  const len = kind==='bus'? .72 : .42; const wid=kind==='bus'? .26:.22;
  const body=smallBox(wid,.12,len,mat,0,.09,0,true,true); g.add(body);
  const cabin=smallBox(wid*.78,.09,len*.42,matGlass,0,.19,kind==='bus'?-.08:-.04,true,true); g.add(cabin);
  const wheelMat=matBlack;
  for(const sx of [-1,1]) for(const sz of [-1,1]) g.add(smallBox(.045,.045,.065,wheelMat,sx*wid*.48,.035,sz*len*.34,true,true));
  return g;
}
function roadNeighbors(x,y){
  const n=[]; if(x>0&&isRoadLike(state.grid[y][x-1].type)) n.push({x:x-1,y}); if(x<COLS-1&&isRoadLike(state.grid[y][x+1].type)) n.push({x:x+1,y}); if(y>0&&isRoadLike(state.grid[y-1][x].type)) n.push({x,y:y-1}); if(y<ROWS-1&&isRoadLike(state.grid[y+1][x].type)) n.push({x,y:y+1}); return n;
}
function railNeighbors(x,y){
  const n=[]; if(x>0&&isRailLike(state.grid[y][x-1].type)) n.push({x:x-1,y}); if(x<COLS-1&&isRailLike(state.grid[y][x+1].type)) n.push({x:x+1,y}); if(y>0&&isRailLike(state.grid[y-1][x].type)) n.push({x,y:y-1}); if(y<ROWS-1&&isRailLike(state.grid[y+1][x].type)) n.push({x,y:y+1}); return n;
}
function chooseNext(n,prev){
  if(n.length===0) return null;
  const filtered = prev ? n.filter(p=>!(p.x===prev.x && p.y===prev.y)) : n;
  return (filtered.length?filtered:n)[Math.floor(rand()*(filtered.length?filtered.length:n.length))];
}
function spawnVehicle(x,y){
  if(vehicles.length > (state.highQuality?150:80)) return;
  const mesh=createVehicleMesh(rand()>.84?'bus':'car'); mesh.position.set(x,.08,y); dynamicGroup.add(mesh);
  const ns=roadNeighbors(x,y); if(!ns.length){ dynamicGroup.remove(mesh); return; }
  const next=ns[Math.floor(rand()*ns.length)];
  vehicles.push({mesh,x,z:y,tx:next.x,tz:next.y,prev:{x,y},speed:2.6+rand()*2.8,life:0});
}

function createTrainCar(index,total){
  const g=new THREE.Group();
  // 山手線風：銀色の車体、黄緑ライン、黒い前面、連続窓
  const body=smallBox(.43,.25,.82,matTrainSilver,0,.19,0,true,true); g.add(body);
  const roof=smallBox(.37,.055,.76,matTrainRoof,0,.34,0,true,true); g.add(roof);
  // 側面の緑ライン
  g.add(smallBox(.018,.055,.72,matTrainGreen,.222,.205,0,true,false));
  g.add(smallBox(.018,.055,.72,matTrainGreen,-.222,.205,0,true,false));
  // 側面窓
  g.add(smallBox(.016,.075,.56,matTrainGlass,.226,.28,.02,true,false));
  g.add(smallBox(.016,.075,.56,matTrainGlass,-.226,.28,.02,true,false));
  // ドアの切れ目
  for(const z of [-.25,0,.25]){
    g.add(smallBox(.019,.19,.012,matTrainFront,.229,.205,z,true,false));
    g.add(smallBox(.019,.19,.012,matTrainFront,-.229,.205,z,true,false));
  }
  // 先頭・最後尾は黒い前面とライトを付ける
  if(index===0 || index===total-1){
    const frontZ = index===0 ? .421 : -.421;
    const face=smallBox(.39,.22,.022,matTrainFront,0,.205,frontZ,true,false); g.add(face);
    const win=smallBox(.28,.075,.026,matTrainGlass,0,.275,frontZ+(index===0?.002:-.002),true,false); g.add(win);
    const sign=smallBox(.12,.035,.028,matTrainGreen,0,.19,frontZ+(index===0?.003:-.003),true,false); g.add(sign);
    for(const sx of [-.12,.12]) g.add(smallBox(.038,.03,.03,matTrainLight,sx,.12,frontZ+(index===0?.006:-.006),true,false));
  }
  // 台車
  for(const z of [-.27,.27]){
    g.add(smallBox(.34,.045,.11,matBlack,0,.055,z,true,true));
    for(const sx of [-.13,.13]) g.add(smallBox(.055,.055,.055,matBlack,sx,.035,z,true,true));
  }
  return g;
}
function createTrainMesh(carCount=6){
  const group=new THREE.Group();
  const cars=[];
  for(let i=0;i<carCount;i++){
    const car=createTrainCar(i,carCount);
    group.add(car); cars.push(car);
  }
  return {group,cars};
}
function spawnTrain(x,y){
  if(trains.length>4) return;
  const ns=railNeighbors(x,y); if(!ns.length) return;
  const next=ns[Math.floor(rand()*ns.length)];
  const built=createTrainMesh(6);
  built.group.position.set(0,0,0); dynamicGroup.add(built.group);
  const dir=new THREE.Vector3(next.x-x,0,next.y-y).normalize();
  const trail=[];
  // 初期状態で後ろの車両も線路上に並ぶよう、先頭の後方に履歴を作る
  for(let d=0; d<7.2; d+=.12) trail.push({x:x-dir.x*d,z:y-dir.z*d});
  const train={group:built.group,cars:built.cars,x,z:y,tx:next.x,tz:next.y,prev:{x,y},speed:1.75+rand()*.45,life:0,trail,spacing:.88};
  trains.push(train);
}
function sampleTrainTrail(trail,back){
  if(!trail.length) return {x:0,z:0,dir:new THREE.Vector3(0,0,1)};
  let remain=back;
  for(let i=0;i<trail.length-1;i++){
    const a=trail[i], b=trail[i+1];
    const seg=Math.hypot(a.x-b.x,a.z-b.z);
    if(seg<.0001) continue;
    if(remain<=seg){
      const t=remain/seg;
      const x=a.x+(b.x-a.x)*t, z=a.z+(b.z-a.z)*t;
      const dir=new THREE.Vector3(a.x-b.x,0,a.z-b.z).normalize();
      return {x,z,dir};
    }
    remain-=seg;
  }
  const last=trail[trail.length-1], prev=trail[Math.max(0,trail.length-2)] || last;
  const dir=new THREE.Vector3(prev.x-last.x,0,prev.z-last.z).normalize();
  return {x:last.x,z:last.z,dir:dir.lengthSq()>.001?dir:new THREE.Vector3(0,0,1)};
}
function pushTrainTrail(train){
  const first=train.trail[0];
  if(!first || Math.hypot(first.x-train.x,first.z-train.z)>.035){
    train.trail.unshift({x:train.x,z:train.z});
    if(train.trail.length>180) train.trail.length=180;
  }
}
function updateTrain(train,delta,removeFn){
  train.life += delta;
  const dx=train.tx-train.x, dz=train.tz-train.z;
  const dist=Math.hypot(dx,dz);
  if(dist<.045){
    const cx=Math.round(train.tx), cy=Math.round(train.tz);
    const n=railNeighbors(cx,cy);
    const next=chooseNext(n,train.prev);
    if(!next || train.life>520){ removeFn(); return false; }
    train.prev={x:cx,y:cy}; train.x=cx; train.z=cy; train.tx=next.x; train.tz=next.y;
  } else {
    const step=Math.min(dist,train.speed*delta);
    train.x += dx/dist*step; train.z += dz/dist*step;
  }
  pushTrainTrail(train);
  for(let i=0;i<train.cars.length;i++){
    const sample=sampleTrainTrail(train.trail,i*train.spacing);
    const car=train.cars[i];
    car.position.set(sample.x,.12,sample.z);
    if(sample.dir.lengthSq()>.001){
      const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),sample.dir);
      car.quaternion.slerp(q,Math.min(1,delta*11));
    }
    // 車両ごとに少しだけ上下に揺らして走行感を出す
    car.position.y += Math.sin(performance.now()*.006 + i*.7)*.006;
  }
  return true;
}
function updateMover(obj,delta,neighborFn,removeFn,offset=0){
  obj.life += delta;
  const dx=obj.tx-obj.x, dz=obj.tz-obj.z;
  const dist=Math.hypot(dx,dz);
  if(dist<0.045){
    const cx=Math.round(obj.tx), cy=Math.round(obj.tz);
    const ns=neighborFn(cx,cy);
    const next=chooseNext(ns,obj.prev);
    if(!next || obj.life>260){ removeFn(); return false; }
    obj.prev={x:cx,y:cy}; obj.x=cx; obj.z=cy; obj.tx=next.x; obj.tz=next.y;
  } else {
    const step = Math.min(dist, obj.speed*delta);
    obj.x += dx/dist*step; obj.z += dz/dist*step;
    const dir=new THREE.Vector3(obj.tx-obj.x,0,obj.tz-obj.z).normalize();
    const side=new THREE.Vector3(-dir.z,0,dir.x).multiplyScalar(offset);
    obj.mesh.position.set(obj.x+side.x,obj.mesh.position.y,obj.z+side.z);
    if(dir.lengthSq()>.01){
      const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,1),dir);
      obj.mesh.quaternion.slerp(q,Math.min(1,delta*10));
    }
  }
  return true;
}
function updateTraffic(delta){
  for(let i=vehicles.length-1;i>=0;i--){
    const v=vehicles[i];
    updateMover(v,delta,roadNeighbors,()=>{dynamicGroup.remove(v.mesh);vehicles.splice(i,1);},0);
  }
  for(let i=pedestrians.length-1;i>=0;i--){
    const p=pedestrians[i];
    updateMover(p,delta,roadNeighbors,()=>{dynamicGroup.remove(p.mesh);pedestrians.splice(i,1);},p.offset);
    p.mesh.rotation.z = Math.sin(performance.now()*.008 + i)*.08;
  }
  for(let i=trains.length-1;i>=0;i--){
    const t=trains[i];
    updateTrain(t,delta,()=>{dynamicGroup.remove(t.group);trains.splice(i,1);});
  }
}

function updateSmoke(delta){
  for(let i=smokeParticles.length-1;i>=0;i--){
    const p=smokeParticles[i]; p.age+=delta;
    if(p.age>=p.maxAge){ p.mesh.material.dispose(); dynamicGroup.remove(p.mesh); smokeParticles.splice(i,1); continue; }
    p.mesh.position.y += delta*.9; p.mesh.position.x += p.driftX*delta; p.mesh.position.z += p.driftZ*delta;
    const s=1+p.age*2.4; p.mesh.scale.set(s,s,s); p.mesh.material.opacity=.42*(1-p.age/p.maxAge);
  }
}

function adjacentCount(x,y,pred){
  let c=0; if(x>0&&pred(state.grid[y][x-1].type)) c++; if(x<COLS-1&&pred(state.grid[y][x+1].type)) c++; if(y>0&&pred(state.grid[y-1][x].type)) c++; if(y<ROWS-1&&pred(state.grid[y+1][x].type)) c++; return c;
}
function nearbyCount(x,y,type,rad){
  let c=0; for(let yy=y-rad;yy<=y+rad;yy++) for(let xx=x-rad;xx<=x+rad;xx++) if(inside(xx,yy) && state.grid[yy][xx].type===type) c++; return c;
}
function nearbyAny(x,y,type,rad){ return nearbyCount(x,y,type,rad)>0; }
function countType(type, builtOnly=false){
  let c=0; for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){ const cell=state.grid[y][x]; if(cell.type===type && (!builtOnly || cell.level>0)) c++; } return c;
}
function updateStatsImmediate(){
  let pop=0,jobs=0,roads=0,parks=0,schools=0,hospitals=0,power=0,rail=0,stations=0,water=0,trees=0,zones=0;
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c=state.grid[y][x];
      if(c.type===TYPES.ROAD) roads++;
      else if(c.type===TYPES.RAIL) rail++;
      else if(c.type===TYPES.STATION){ stations++; rail++; roads++; }
      else if(c.type===TYPES.PARK) parks++;
      else if(c.type===TYPES.SCHOOL) schools++;
      else if(c.type===TYPES.HOSPITAL) hospitals++;
      else if(c.type===TYPES.POWER) power++;
      else if(c.type===TYPES.WATER) water++;
      else if(c.type===TYPES.TREE) trees++;
      if(c.type===TYPES.RES && c.level>0){ pop += c.level * (7 + c.level*2); zones++; }
      if(c.type===TYPES.COM && c.level>0){ jobs += c.level * (8 + c.level*3); zones++; }
      if(c.type===TYPES.IND && c.level>0){ jobs += c.level * (10 + c.level*4); zones++; }
    }
  }
  const traffic = roads ? clamp((vehicles.length*2 + pop*.015 + jobs*.011) / Math.max(1,roads) * 11, 0, 100) : 0;
  const powerCap = power*1600 + 700;
  const powerUse = pop*1.35 + jobs*.95 + zones*8;
  const serviceScore = clamp((parks*2 + schools*18 + hospitals*22 + stations*8) / Math.max(12, pop/80 + 12),0,35);
  const pollution = clamp(countType(TYPES.IND,true)*1.8 + power*8 - parks*.45 - trees*.025,0,32);
  const happiness = clamp(72 + serviceScore - pollution - Math.max(0,traffic-55)*.32 - (powerUse>powerCap?22:0), 5, 100);
  state.population=pop; state.jobs=jobs; state.traffic=Math.round(traffic); state.powerCap=powerCap; state.powerUse=powerUse; state.happiness=Math.round(happiness); state.railCount=rail; state.stationCount=stations;
  return {pop,jobs,roads,parks,schools,hospitals,power,rail,stations,traffic,happiness,powerCap,powerUse,zones};
}
function simulateDay(){
  state.day++;
  state.hour = (state.hour + 2) % 24;
  const stats = updateStatsImmediate();
  // 収支バランスを調整：序盤からずっと赤字にならないよう、税収を少し強化して維持費を現実的に下げる
  const cityGrant = stats.pop < 240 ? 120 : 0;
  const tax = Math.floor(cityGrant + stats.pop*4.6 + stats.jobs*3.4 + state.happiness*3.2 + stats.stations*24);
  const upkeep = Math.floor(stats.roads*.45 + stats.rail*1.05 + stats.parks*3.5 + stats.schools*16 + stats.hospitals*22 + stats.power*30 + stats.stations*14);
  state.incomeLastDay = tax; state.upkeepLastDay = upkeep; state.money += tax - upkeep;

  const powerPenalty = stats.powerUse > stats.powerCap ? 25 : 0;
  const serviceBoost = clamp((stats.parks + stats.schools*4 + stats.hospitals*5 + stats.stations*2) / 20, 0, 22);
  state.demandR = clamp(68 + stats.jobs*.55 - stats.pop*.22 + serviceBoost - powerPenalty,0,100);
  state.demandC = clamp(stats.pop*.18 + state.happiness*.25 - countType(TYPES.COM,true)*5 + stats.stations*3 - powerPenalty,0,100);
  state.demandI = clamp(stats.pop*.13 + countType(TYPES.COM,true)*1.8 - countType(TYPES.IND,true)*5 - powerPenalty*.7,0,100);

  const roadCells=[]; const railStationCells=[]; const developedRoads=[];
  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      const c=state.grid[y][x];
      if(isRoadLike(c.type)){ roadCells.push({x,y}); if(nearbyCount(x,y,TYPES.RES,2)+nearbyCount(x,y,TYPES.COM,2)+nearbyCount(x,y,TYPES.IND,2)>0) developedRoads.push({x,y}); }
      if(c.type===TYPES.STATION) railStationCells.push({x,y});
      if(!isZone(c.type)) continue;
      const roadOk = adjacentCount(x,y,isRoadLike)>0;
      if(!roadOk){
        if(c.level>0 && rand()<.09){ c.level--; createMeshForCell(x,y,c,false); }
        continue;
      }
      c.age++;
      let demand = c.type===TYPES.RES?state.demandR:(c.type===TYPES.COM?state.demandC:state.demandI);
      let score = demand/100;
      if(nearbyAny(x,y,TYPES.PARK,3)) score += .18;
      if(nearbyAny(x,y,TYPES.SCHOOL,6) && c.type===TYPES.RES) score += .14;
      if(nearbyAny(x,y,TYPES.HOSPITAL,6) && c.type===TYPES.RES) score += .12;
      if(nearbyAny(x,y,TYPES.STATION,5)) score += .18;
      if(state.happiness>80) score += .08;
      if(state.powerUse>state.powerCap) score -= .28;
      if(c.type===TYPES.IND && nearbyAny(x,y,TYPES.RES,2)) score -= .15;
      c.lastScore = score;
      const growChance = clamp(score*.30/(c.level+1),0,.28);
      const decayChance = score<.08 ? .05 : 0;
      if(c.level<MAX_LEVEL && rand()<growChance){ c.level++; createMeshForCell(x,y,c,true); }
      else if(c.level>0 && rand()<decayChance){ c.level--; createMeshForCell(x,y,c,false); }
    }
  }
  // 車・人・電車を自然発生
  const spawnCount = clamp(Math.floor((stats.pop+stats.jobs)/140),1,12);
  for(let i=0;i<spawnCount;i++) if(developedRoads.length && rand()<.8) { const s=developedRoads[Math.floor(rand()*developedRoads.length)]; spawnVehicle(s.x,s.y); }
  for(let i=0;i<Math.min(8,spawnCount+2);i++) if(developedRoads.length && rand()<.65) { const s=developedRoads[Math.floor(rand()*developedRoads.length)]; spawnPedestrian(s.x,s.y); }
  if(railStationCells.length>=1 && stats.rail>5 && rand()<.45){ const s=railStationCells[Math.floor(rand()*railStationCells.length)]; spawnTrain(s.x,s.y); }
  state.autoSaveCounter++;
  if(state.autoSaveCounter>=10){ saveGame(false); state.autoSaveCounter=0; }
  updateUI();
}

function getGridIntersect(event){
  const rect=renderer.domElement.getBoundingClientRect();
  let cx=event.clientX, cy=event.clientY;
  if(event.touches && event.touches[0]){ cx=event.touches[0].clientX; cy=event.touches[0].clientY; }
  mouse.x = ((cx-rect.left)/rect.width)*2-1;
  mouse.y = -((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hit=raycaster.intersectObject(ground,false)[0];
  if(!hit) return null;
  return {x:Math.round(hit.point.x), y:Math.round(hit.point.z), clientX:cx, clientY:cy};
}
function canPlaceOn(cell,type){
  if(!cell || cell.type===TYPES.WATER) return false;
  if(type===TYPES.ROAD || type===TYPES.RAIL || type===TYPES.PARK) return cell.type===TYPES.EMPTY || cell.type===TYPES.TREE;
  if(type===TYPES.STATION) return cell.type===TYPES.RAIL || cell.type===TYPES.EMPTY || cell.type===TYPES.TREE;
  return cell.type===TYPES.EMPTY || cell.type===TYPES.TREE;
}
function applyTool(gx,gy){
  if(!inside(gx,gy)) return;
  const key = gx+','+gy+','+state.selectedTool;
  if(key===state.lastAppliedKey) return;
  state.lastAppliedKey = key;
  const cell=state.grid[gy][gx];
  if(state.selectedTool==='pointer') return;
  let changed=false, cost=0, newType=null;
  if(state.selectedTool==='bulldoze'){
    if(cell.type!==TYPES.EMPTY && cell.type!==TYPES.WATER){ cost=COSTS.bulldoze; if(state.money>=cost){ cell.type=TYPES.EMPTY; cell.level=0; cell.age=0; changed=true; }}
  } else {
    newType = TOOL_TYPE[state.selectedTool]; cost = COSTS[state.selectedTool] || 0;
    if(canPlaceOn(cell,newType) && state.money>=cost){ cell.type=newType; cell.level=0; cell.age=0; cell.seed=hash01(gx,gy,31); changed=true; }
  }
  if(!changed){
    if(state.money < cost) toast('資金が足りません');
    return;
  }
  state.money -= cost;
  createMeshForCell(gx,gy,cell,true);
  updateCellAndNeighbors(gx,gy);
  updateStatsImmediate(); updateUI();
  saveGame(false);
}
function setTool(tool,btn){
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  state.selectedTool=tool;
  controls.enabled = tool === 'pointer';
  cursorMesh.visible=false;
  const color = tool==='bulldoze'?0xef4444:tool==='rail'?0xf97316:tool==='station'?0x22d3ee:tool==='road'?0xf8fafc:0x22c55e;
  cursorMesh.material.color.setHex(color);
  toast(tool==='pointer'?'カメラ操作モード':`${toolLabel(tool)} モード`);
}
function toolLabel(tool){
  const map={road:'道路',rail:'線路',station:'駅',res:'住宅',com:'商業',ind:'産業',park:'公園',school:'学校',hospital:'病院',power:'発電所',bulldoze:'撤去',pointer:'カメラ'};
  return map[tool]||tool;
}
container.addEventListener('pointerdown',e=>{
  if(e.target !== renderer.domElement) return;
  state.lastAppliedKey='';
  if(state.selectedTool==='pointer') return;
  state.isDraggingTool=true;
  const pos=getGridIntersect(e); if(pos) applyTool(pos.x,pos.y);
});
container.addEventListener('pointermove',e=>{
  const pos=getGridIntersect(e);
  if(pos && inside(pos.x,pos.y)){
    cursorMesh.position.set(pos.x,.54,pos.y);
    cursorMesh.visible = state.selectedTool !== 'pointer';
    if(state.isDraggingTool && state.selectedTool!=='pointer') applyTool(pos.x,pos.y);
    updateTooltip(pos.clientX,pos.clientY,pos.x,pos.y);
  } else {
    cursorMesh.visible=false; document.getElementById('tooltip').classList.add('hidden');
  }
});
window.addEventListener('pointerup',()=>{state.isDraggingTool=false;state.lastAppliedKey='';});
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight);
});
document.querySelectorAll('.tool-btn').forEach(btn=>btn.addEventListener('click',e=>setTool(e.currentTarget.dataset.tool,e.currentTarget)));
document.querySelectorAll('.speed-btn').forEach(btn=>btn.addEventListener('click',e=>{
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active'));
  e.currentTarget.classList.add('active'); state.speed=parseInt(e.currentTarget.dataset.speed,10); saveGame(false); toast(state.speed===0?'停止中':state.speed===1?'通常速度':'高速モード');
}));

document.getElementById('toggle-night').addEventListener('click',e=>{ state.forceNight=!state.forceNight; e.currentTarget.classList.toggle('active',state.forceNight); updateLighting(); saveGame(false); toast(state.forceNight?'夜景モード ON':'夜景モード OFF'); });
document.getElementById('toggle-quality').addEventListener('click',e=>{ state.highQuality=!state.highQuality; e.currentTarget.classList.toggle('active',state.highQuality); renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,state.highQuality?1.75:1.05)); renderer.shadowMap.enabled=state.highQuality; saveGame(false); toast(state.highQuality?'高画質モード':'軽量モード'); });
document.getElementById('btn-save').addEventListener('click',()=>saveGame(true));
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(confirm('街を最初から作り直しますか？')){ localStorage.removeItem(SAVE_KEY); resetGame(); toast('新しい街を生成しました'); }
});

// =============================
// ツールチップ・UI
// =============================
function updateTooltip(cx,cy,gx,gy){
  const tooltip=document.getElementById('tooltip');
  if(state.selectedTool!=='pointer'){ tooltip.classList.add('hidden'); return; }
  const c=cellAt(gx,gy); if(!c) return;
  let title=TYPE_NAME[c.type] || 'セル'; let desc='開発可能な土地です。'; let hint='';
  if(c.type===TYPES.WATER) desc='水辺です。ここには建設できません。';
  else if(c.type===TYPES.TREE) desc='自然林です。公園や道路にできます。';
  else if(c.type===TYPES.ROAD) desc=`道路です。交通と建物の接続に必要です。周囲の道路 ${adjacentCount(gx,gy,isRoadLike)} 本`;
  else if(c.type===TYPES.RAIL) desc=`線路です。駅を置くと電車が走ります。周囲の線路 ${adjacentCount(gx,gy,isRailLike)} 本`;
  else if(c.type===TYPES.STATION) desc='駅です。近くの建物の成長と商業需要を上げます。';
  else if(c.type===TYPES.PARK) desc='公園です。住宅の成長と幸福度を上げます。';
  else if(c.type===TYPES.SCHOOL) desc='学校です。住宅地の価値と幸福度を上げます。';
  else if(c.type===TYPES.HOSPITAL) desc='病院です。幸福度を大きく上げます。';
  else if(c.type===TYPES.POWER) desc='発電所です。都市全体に電力を供給します。';
  else if(isZone(c.type)){
    desc = c.level===0 ? '建設予定地です。道路につながると建物が成長します。' : `レベル ${c.level} / ${MAX_LEVEL} の建物です。成長スコア ${Math.round(c.lastScore*100)}%`;
    if(adjacentCount(gx,gy,isRoadLike)===0) hint='道路を横につなげると発展します。';
    else if(state.powerUse>state.powerCap) hint='電力不足です。発電所を追加してください。';
    else if(c.type===TYPES.RES && !nearbyAny(gx,gy,TYPES.PARK,3)) hint='近くに公園を置くと成長しやすくなります。';
  }
  document.getElementById('tt-title').innerText=title;
  document.getElementById('tt-desc').innerText=desc;
  const h=document.getElementById('tt-hint'); if(hint){h.innerText='💡 '+hint;h.classList.remove('hidden');}else h.classList.add('hidden');
  let tx=cx+18, ty=cy+18; if(tx+220>window.innerWidth) tx=cx-230; if(ty+130>window.innerHeight) ty=cy-140;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px'; tooltip.classList.remove('hidden');
}
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1700);
}
function updateUI(){
  document.getElementById('ui-money').innerText=Math.round(state.money).toLocaleString();
  const net=state.incomeLastDay-state.upkeepLastDay; const inc=document.getElementById('ui-income'); inc.innerText=(net>=0?'+':'-')+'$'+Math.abs(net).toLocaleString(); inc.className='text-sm font-black '+(net>=0?'text-emerald-400':'text-red-400');
  document.getElementById('ui-pop').innerText=state.population.toLocaleString();
  document.getElementById('ui-jobs').innerText=state.jobs.toLocaleString();
  document.getElementById('ui-happy').innerText=state.happiness+'%';
  document.getElementById('ui-traffic').innerText=state.traffic+'%';
  document.getElementById('ui-date').innerText='Day '+state.day;
  document.getElementById('ui-hour').innerText=String(Math.floor(state.hour)).padStart(2,'0')+':00';
  document.getElementById('ui-power').innerText=state.powerUse>state.powerCap?'不足':'OK';
  document.getElementById('ui-power').className='text-xl font-black '+(state.powerUse>state.powerCap?'text-red-400':'text-emerald-400');
  document.getElementById('ui-rail').innerText=state.stationCount+'駅';
  document.getElementById('demand-r').style.height=state.demandR+'%';
  document.getElementById('demand-c').style.height=state.demandC+'%';
  document.getElementById('demand-i').style.height=state.demandI+'%';
}

// =============================
// 昼夜・保存
// =============================
function isNight(){ return state.forceNight || state.hour>=19 || state.hour<5; }
function updateLighting(){
  const night=isNight();
  const dayFactor = state.forceNight ? 0 : Math.max(0, Math.sin((state.hour-5)/14*Math.PI));
  if(night){
    scene.background.set(0x07111f); scene.fog.color.set(0x07111f); scene.fog.density=.017;
    hemiLight.intensity=.22; sun.intensity=.12; moon.intensity=.85; renderer.toneMappingExposure=.88;
  } else {
    scene.background.set(dayFactor>.45?0x8bbfe8:0xf0a46b); scene.fog.color.copy(scene.background); scene.fog.density=.011;
    hemiLight.intensity=.55 + dayFactor*.3; sun.intensity=1.0 + dayFactor*1.7; moon.intensity=0; renderer.toneMappingExposure=1.05;
    sun.position.set(COLS*.85, 22 + 72*dayFactor, ROWS*(.15+.45*(1-dayFactor)));
  }
  // 夜だけ窓・街灯を発光
  for(const mat of streetLights) mat.emissiveIntensity = night ? 1.15 : .05;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const c=state.grid[y][x]; if(c.glowObj) c.glowObj.visible=night;
  }
}
function serializeGrid(){
  return state.grid.map(row=>row.map(c=>[c.type,c.level,Math.round((c.seed||0)*100000)/100000,c.age||0,Math.round((c.lastScore||0)*1000)/1000]));
}
function saveGame(show=true){
  try{
    const data={
      version:2,
      money:state.money, day:state.day, hour:state.hour, speed:state.speed,
      demandR:state.demandR, demandC:state.demandC, demandI:state.demandI,
      incomeLastDay:state.incomeLastDay, upkeepLastDay:state.upkeepLastDay,
      highQuality:state.highQuality, forceNight:state.forceNight,
      population:state.population, jobs:state.jobs, happiness:state.happiness,
      grid:serializeGrid(), savedAt:Date.now()
    };
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    if(show) toast('ブラウザに完全保存しました');
  }catch(e){ if(show) toast('保存できませんでした'); }
}
function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY); if(!raw) return false;
    const data=JSON.parse(raw); if(!data.grid || data.grid.length!==ROWS) return false;
    state.money=data.money??state.money; state.day=data.day??1; state.hour=data.hour??6;
    state.speed=data.speed??1; state.demandR=data.demandR??state.demandR; state.demandC=data.demandC??state.demandC; state.demandI=data.demandI??state.demandI;
    state.incomeLastDay=data.incomeLastDay??0; state.upkeepLastDay=data.upkeepLastDay??0;
    state.highQuality=data.highQuality??state.highQuality; state.forceNight=data.forceNight??false;
    state.population=data.population??0; state.jobs=data.jobs??0; state.happiness=data.happiness??82;
    state.grid=[];
    for(let y=0;y<ROWS;y++){
      const row=[];
      for(let x=0;x<COLS;x++){
        const d=data.grid[y][x];
        const c=newCell(d[0]); c.level=d[1]||0; c.seed=d[2]||hash01(x,y,31); c.age=d[3]||0; c.lastScore=d[4]||0; row.push(c);
      }
      state.grid.push(row);
    }
    return true;
  }catch(e){ return false; }
}
function syncSavedSettingsUI(){
  document.getElementById('toggle-night').classList.toggle('active',state.forceNight);
  document.getElementById('toggle-quality').classList.toggle('active',state.highQuality);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,state.highQuality?1.75:1.05));
  renderer.shadowMap.enabled=state.highQuality;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.speed,10)===state.speed));
}
window.addEventListener('beforeunload',()=>saveGame(false));
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') saveGame(false); });
function resetGame(){
  randSeed=913257; state.money=52000; state.population=0; state.jobs=0; state.day=1; state.hour=6; state.speed=1; state.demandR=65; state.demandC=25; state.demandI=25;
  vehicles.splice(0).forEach(v=>dynamicGroup.remove(v.mesh)); pedestrians.splice(0).forEach(p=>dynamicGroup.remove(p.mesh)); trains.splice(0).forEach(t=>dynamicGroup.remove(t.group)); smokeParticles.splice(0).forEach(p=>dynamicGroup.remove(p.mesh));
  initGrid(); buildAllMeshes(); updateStatsImmediate(); updateUI(); updateLighting(); saveGame(false);
}

// =============================
// ループ
// =============================
const clock=new THREE.Clock();
function simSpeedFactor(){
  // 通常速度は前版の半分、倍速は前版と同じ速さを維持
  if(state.speed===0) return 0;
  if(state.speed===1) return .5;
  if(state.speed===3) return 3;
  return state.speed;
}
function animate(){
  requestAnimationFrame(animate);
  const delta=Math.min(.05,clock.getDelta());
  const worldSpeed = simSpeedFactor();
  if(worldSpeed>0){
    state.tickCounter += delta * 1000 * worldSpeed;
    if(state.tickCounter>820){ state.tickCounter=0; simulateDay(); updateLighting(); }
    updateTraffic(delta*worldSpeed);
    updateSmoke(delta*worldSpeed);
    if(smokeEmitters.length && rand()<.12*worldSpeed){ const e=smokeEmitters[Math.floor(rand()*smokeEmitters.length)]; spawnSmoke(e.x+.25,e.y,e.z+.25); }
    for(let i=buildingAnimations.length-1;i>=0;i--){
      const a=buildingAnimations[i]; a.t+=delta*a.speed*worldSpeed; const s=clamp(a.t,0,1); a.obj.scale.y=.02 + (1-.02)*(1-Math.pow(1-s,3));
      if(s>=1){ a.obj.scale.y=1; buildingAnimations.splice(i,1); }
    }
  }
  // 水面を微妙に揺らす
  const t=performance.now()*0.001;
  matWater.opacity = .78 + Math.sin(t)*.04;
  matWaterDeep.opacity = .74 + Math.sin(t*.9+.5)*.035;
  controls.update(); renderer.render(scene,camera);
}

// 起動
if(!loadGame()) initGrid();
buildAllMeshes();
syncSavedSettingsUI();
updateStatsImmediate(); updateUI(); updateLighting();
setTimeout(()=>cover.classList.add('hide'),600);
toast('完全版の街づくりを開始しました');
animate();
})();
</script>
